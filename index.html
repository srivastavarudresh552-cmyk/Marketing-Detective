<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Detective — Case Files</title>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
/* ============================================================
   MARKETING DETECTIVE — Claude Orange Noir Theme
   ============================================================ */
:root{
  --bg-void:#120c09;
  --bg-deep:#1c130d;
  --cork:#4a3320;
  --cork-dark:#3a2718;
  --cork-line:rgba(0,0,0,0.28);
  --paper:#ece2c8;
  --paper-dark:#ddceac;
  --paper-line:#c9b98f;
  --ink:#2a2016;
  --ink-soft:#5a4a36;
  --accent:#d97757;
  --accent-bright:#ff9a6b;
  --accent-dim:#8f4a30;
  --glow:rgba(217,119,87,0.55);
  --gold:#e0b256;
  --text-hi:#f5ead9;
  --text-mid:#cbb99e;
  --text-low:#8c7a63;
  --danger:#b5453a;
  --success:#e0b256;
  --font-display: Georgia, 'Times New Roman', serif;
  --font-type: 'Courier New', Courier, monospace;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse at 20% 0%, rgba(217,119,87,0.06), transparent 55%),
    radial-gradient(ellipse at 80% 100%, rgba(217,119,87,0.05), transparent 55%),
    var(--bg-void);
  color:var(--text-hi);
  font-family:var(--font-ui);
  min-height:100vh;
  overflow-x:hidden;
}
#root{min-height:100vh;}
::selection{background:var(--accent);color:#1c130d;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--bg-deep);}
::-webkit-scrollbar-thumb{background:var(--cork);border-radius:6px;}
::-webkit-scrollbar-thumb:hover{background:var(--accent-dim);}

button{font-family:inherit;cursor:pointer;}
button:focus-visible, [tabindex]:focus-visible, input:focus-visible{
  outline:2px solid var(--accent-bright);
  outline-offset:2px;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
}

/* ---------- Layout shells ---------- */
.app-shell{min-height:100vh;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 26px;
  background:linear-gradient(180deg, rgba(28,19,13,0.95), rgba(28,19,13,0.75));
  border-bottom:1px solid var(--cork);
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(6px);
}
.brand{
  display:flex;align-items:center;gap:10px;
  font-family:var(--font-display);
  font-weight:700;letter-spacing:0.5px;font-size:1.15rem;
  color:var(--text-hi);
}
.brand .badge-star{color:var(--accent);font-size:1.3rem;filter:drop-shadow(0 0 6px var(--glow));}
.rank-pill{
  font-family:var(--font-type);font-size:0.72rem;letter-spacing:1px;
  color:var(--gold);border:1px solid var(--gold);border-radius:20px;
  padding:4px 12px;text-transform:uppercase;
}
.stage-container{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:32px 18px 60px;position:relative;
}
.stage-inner{width:100%;max-width:1100px;}

/* ---------- Cork board texture ---------- */
.corkboard{
  background:
    repeating-radial-gradient(circle at 15% 25%, rgba(0,0,0,0.10) 0px, transparent 2px),
    repeating-radial-gradient(circle at 65% 70%, rgba(0,0,0,0.08) 0px, transparent 3px),
    repeating-linear-gradient(45deg, var(--cork) 0px, var(--cork) 2px, var(--cork-dark) 2px, var(--cork-dark) 4px);
  border:10px solid #2a1c11;
  border-radius:6px;
  box-shadow: inset 0 0 60px rgba(0,0,0,0.55), 0 20px 50px rgba(0,0,0,0.6);
  position:relative;
  padding:28px;
}
.corkboard::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.35) 100%);
  pointer-events:none;border-radius:6px;
}

/* ---------- Push pin ---------- */
.pin{
  width:16px;height:16px;border-radius:50%;
  position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  background:radial-gradient(circle at 35% 30%, var(--accent-bright), var(--accent-dim) 70%);
  box-shadow:0 3px 5px rgba(0,0,0,0.6), 0 0 8px var(--glow);
  z-index:3;
}
.pin::after{
  content:'';position:absolute;top:12px;left:6px;width:2px;height:6px;background:rgba(0,0,0,0.4);
}

/* ---------- Paper / sticky note / index card ---------- */
.paper-card{
  background:
    repeating-linear-gradient(var(--paper) 0px, var(--paper) 27px, var(--paper-line) 28px),
    var(--paper);
  color:var(--ink);
  border-radius:2px;
  box-shadow:0 8px 18px rgba(0,0,0,0.45), 0 2px 0 rgba(255,255,255,0.4) inset;
  padding:18px 20px;
  position:relative;
  font-family:var(--font-type);
  transform:rotate(var(--tilt,0deg));
  transition:transform 0.25s ease, box-shadow 0.25s ease;
}
.paper-card:hover{transform:rotate(0deg) translateY(-3px);box-shadow:0 14px 26px rgba(0,0,0,0.55);}
.paper-card h4{
  margin:4px 0 10px;font-family:var(--font-display);font-size:1.05rem;color:var(--ink);
  border-bottom:1px dashed var(--ink-soft);padding-bottom:6px;
}
.sticky{
  background:linear-gradient(160deg,#f3d98b,#e6c465);
  color:#332400;
  box-shadow:3px 6px 10px rgba(0,0,0,0.4);
  border-radius:2px;padding:14px 16px;
  font-family:var(--font-type);font-size:0.85rem;line-height:1.45;
  transform:rotate(var(--tilt,-2deg));
  position:relative;
}
.sticky::before{
  content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  width:20px;height:16px;background:rgba(255,255,255,0.35);
  clip-path:polygon(0 0,100% 0,100% 60%,0 100%);
}

/* ---------- Folder ---------- */
.folder{
  background:linear-gradient(160deg,#c99a5b,#a97c40);
  border-radius:3px 10px 6px 6px;
  box-shadow:0 10px 24px rgba(0,0,0,0.5);
  position:relative;
  color:#2a1c0e;
}
.folder-tab{
  position:absolute;top:-16px;left:22px;
  background:#b8894e;
  padding:5px 18px;border-radius:6px 6px 0 0;
  font-family:var(--font-display);font-weight:700;font-size:0.82rem;
  letter-spacing:0.5px;color:#2a1c0e;
  box-shadow:0 -3px 6px rgba(0,0,0,0.25) inset;
}

/* ---------- Buttons ---------- */
.btn{
  border:none;border-radius:6px;padding:13px 28px;
  font-size:0.95rem;font-weight:700;letter-spacing:0.6px;
  text-transform:uppercase;font-family:var(--font-ui);
  transition:transform 0.15s ease, box-shadow 0.25s ease, background 0.2s ease;
  display:inline-flex;align-items:center;gap:8px;
}
.btn-primary{
  background:linear-gradient(160deg,var(--accent-bright),var(--accent));
  color:#241209;
  box-shadow:0 6px 18px rgba(217,119,87,0.35), 0 0 0 1px rgba(255,255,255,0.15) inset;
}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 26px var(--glow);}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed;filter:grayscale(0.4);}
.btn-ghost{
  background:transparent;border:1.5px solid var(--cork);color:var(--text-mid);
}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent-bright);}

/* ---------- Intro / Case Assignment ---------- */
.intro-wrap{
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:26px;
  padding:40px 20px;animation:fadeUp 0.7s ease;
}
.lamp-glow{
  width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle, var(--glow) 0%, transparent 65%);
  position:absolute;top:20px;left:50%;transform:translateX(-50%);
  filter:blur(10px);pointer-events:none;z-index:0;
}
.badge-icon{
  width:96px;height:96px;position:relative;z-index:1;
  filter:drop-shadow(0 0 18px var(--glow));
}
.title-main{
  font-family:var(--font-display);font-size:clamp(2.1rem,5vw,3.4rem);
  color:var(--text-hi);margin:0;letter-spacing:1px;position:relative;z-index:1;
}
.title-sub{
  font-family:var(--font-type);color:var(--accent-bright);letter-spacing:3px;
  text-transform:uppercase;font-size:0.85rem;position:relative;z-index:1;
}
.brief-copy{max-width:560px;color:var(--text-mid);line-height:1.7;font-size:1rem;position:relative;z-index:1;}

.case-folder-anim{
  width:min(420px,88vw);
  cursor:pointer;position:relative;
  perspective:1400px;
}
.folder-closed{
  background:linear-gradient(160deg,#c99a5b,#a97c40);
  border-radius:4px 14px 8px 8px;
  box-shadow:0 18px 40px rgba(0,0,0,0.55);
  padding:34px 26px;
  text-align:center;
  transition:transform 0.35s ease, box-shadow 0.35s ease;
}
.folder-closed:hover{transform:translateY(-6px) scale(1.015);box-shadow:0 26px 54px rgba(0,0,0,0.6);}
.folder-stamp{
  display:inline-block;border:3px solid var(--danger);color:var(--danger);
  padding:6px 16px;font-family:var(--font-display);font-weight:800;
  letter-spacing:2px;transform:rotate(-8deg);border-radius:4px;
  font-size:0.95rem;margin-top:14px;
}
.folder-label{
  font-family:var(--font-type);color:#2a1c0e;font-size:0.95rem;letter-spacing:1px;
}
.folder-taps{color:#6b4a24;font-size:0.78rem;margin-top:16px;font-family:var(--font-type);}

/* ---------- Progress dots ---------- */
.progress-track{display:flex;gap:8px;align-items:center;justify-content:center;margin:0 0 26px;}
.progress-dot{
  width:9px;height:9px;border-radius:50%;background:var(--cork);
  transition:all 0.3s ease;
}
.progress-dot.active{background:var(--accent-bright);box-shadow:0 0 10px var(--glow);width:24px;border-radius:5px;}
.progress-dot.done{background:var(--gold);}
.progress-label{
  font-family:var(--font-type);font-size:0.72rem;color:var(--text-low);
  text-align:center;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;
}

/* ---------- Investigation board layout ---------- */
.board-header{
  display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between;
  margin-bottom:18px;
}
.board-title{font-family:var(--font-display);font-size:1.5rem;color:var(--text-hi);}
.board-sub{font-family:var(--font-type);color:var(--accent-bright);font-size:0.8rem;letter-spacing:1px;}

.tab-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px;}
.tab-btn{
  background:var(--bg-deep);border:1px solid var(--cork);color:var(--text-mid);
  padding:9px 16px;border-radius:20px;font-size:0.8rem;font-family:var(--font-ui);
  font-weight:600;letter-spacing:0.4px;transition:all 0.2s ease;
  display:flex;align-items:center;gap:6px;
}
.tab-btn.active{
  background:linear-gradient(160deg,var(--accent-bright),var(--accent));
  color:#241209;border-color:transparent;box-shadow:0 4px 14px var(--glow);
}
.tab-btn:hover:not(.active){border-color:var(--accent-dim);color:var(--text-hi);}
.tab-check{color:var(--gold);font-size:0.85rem;}

.panel{
  animation:fadeUp 0.4s ease;
}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px;}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;}

.stat-line{display:flex;justify-content:space-between;font-size:0.82rem;padding:5px 0;border-bottom:1px dotted var(--ink-soft);}
.stat-line span:first-child{color:var(--ink-soft);}
.stat-line span:last-child{font-weight:700;}

.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.chip{
  background:rgba(42,32,22,0.08);border:1px solid var(--ink-soft);
  color:var(--ink);padding:5px 11px;border-radius:14px;font-size:0.76rem;
}

/* ---------- Bar chart (budget) ---------- */
.bar-row{display:flex;align-items:center;gap:10px;margin:10px 0;}
.bar-label{width:120px;font-size:0.78rem;color:var(--ink);flex-shrink:0;}
.bar-track{flex:1;height:14px;background:rgba(0,0,0,0.12);border-radius:8px;overflow:hidden;}
.bar-fill{
  height:100%;border-radius:8px;
  background:linear-gradient(90deg,var(--accent-dim),var(--accent));
  width:0;transition:width 1.1s cubic-bezier(.2,.8,.2,1);
}
.bar-pct{width:38px;text-align:right;font-size:0.78rem;font-weight:700;color:var(--ink);}

/* ---------- Gauge ---------- */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
.gauge-label{font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);}
.gauge-value{font-family:var(--font-display);font-size:1.3rem;color:var(--ink);font-weight:700;}

/* ---------- Comments / witness statements ---------- */
.witness-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}

/* ---------- Social performance ---------- */
.social-card{
  background:var(--bg-deep);border:1px solid var(--cork);border-radius:10px;
  padding:20px;color:var(--text-hi);
}
.social-metric-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--cork);font-size:0.88rem;}
.social-metric-row:last-child{border-bottom:none;}
.social-metric-row b{color:var(--accent-bright);}

/* ---------- Clue / evidence locker ---------- */
.locker-zone{
  min-height:150px;border:2px dashed var(--cork);border-radius:10px;
  padding:18px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;
  transition:border-color 0.25s ease, background 0.25s ease;
  background:rgba(0,0,0,0.15);
}
.locker-zone.drag-over{border-color:var(--accent-bright);background:rgba(217,119,87,0.08);}
.locker-empty{color:var(--text-low);font-family:var(--font-type);font-size:0.85rem;margin:auto;}
.clue-scatter{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:24px;}
.clue-card{
  width:220px;cursor:grab;user-select:none;
}
.clue-card.collected{opacity:0.25;pointer-events:none;transform:scale(0.9) rotate(0deg) !important;}
.clue-card:active{cursor:grabbing;}
.clue-locked-tag{
  display:inline-block;background:var(--gold);color:#2a1c0e;font-size:0.68rem;
  padding:2px 8px;border-radius:10px;font-family:var(--font-ui);font-weight:700;margin-left:8px;
}
.evidence-item{
  background:linear-gradient(160deg,#f3d98b,#e6c465);color:#332400;
  padding:8px 14px;border-radius:4px;font-family:var(--font-type);font-size:0.78rem;
  box-shadow:0 3px 8px rgba(0,0,0,0.4);animation:popIn 0.35s ease;
}

/* ---------- Solve / suspect lineup ---------- */
.suspect-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;margin:22px 0;}
.suspect-card{
  background:var(--bg-deep);border:2px solid var(--cork);border-radius:12px;
  padding:20px;cursor:pointer;transition:all 0.2s ease;position:relative;
}
.suspect-card:hover{border-color:var(--accent-dim);transform:translateY(-3px);}
.suspect-card.selected{border-color:var(--accent-bright);box-shadow:0 0 0 3px var(--glow);background:rgba(217,119,87,0.07);}
.suspect-num{
  font-family:var(--font-display);color:var(--accent-bright);font-size:0.75rem;
  letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:block;
}
.suspect-text{font-size:0.92rem;line-height:1.5;color:var(--text-hi);}
.suspect-check{
  position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;
  border:2px solid var(--cork);display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;color:transparent;
}
.suspect-card.selected .suspect-check{background:var(--accent-bright);border-color:var(--accent-bright);color:#241209;}

/* ---------- Case closed ---------- */
.closed-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:60px 20px;min-height:50vh;position:relative;
}
.stamp{
  font-family:var(--font-display);font-weight:900;font-size:clamp(2.4rem,8vw,4.4rem);
  color:var(--danger);border:6px solid var(--danger);border-radius:10px;
  padding:14px 34px;letter-spacing:4px;text-transform:uppercase;
  transform:rotate(-9deg) scale(0);
  animation:stampSlam 0.55s cubic-bezier(.34,1.56,.64,1) 0.15s forwards;
  box-shadow:0 0 0 rgba(181,69,58,0);
}
.result-verdict{margin-top:26px;font-family:var(--font-type);font-size:1rem;color:var(--text-mid);opacity:0;animation:fadeUp 0.6s ease 0.7s forwards;}
.result-correct{color:var(--gold);}
.result-wrong{color:var(--danger);}
.confetti-piece{
  position:absolute;top:-10px;width:8px;height:14px;opacity:0.9;
  animation:confettiFall linear forwards;
}

/* ---------- Learning report ---------- */
.report-header{text-align:center;margin-bottom:26px;}
.report-score{
  font-family:var(--font-display);font-size:2.6rem;color:var(--accent-bright);
  text-shadow:0 0 20px var(--glow);
}
.report-section{margin-bottom:22px;}
.report-section h3{
  font-family:var(--font-display);color:var(--text-hi);font-size:1.05rem;
  border-bottom:1px solid var(--cork);padding-bottom:8px;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.improve-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px;}
.improve-list li{
  background:var(--bg-deep);border-left:3px solid var(--accent);border-radius:4px;
  padding:12px 16px;font-size:0.9rem;color:var(--text-mid);line-height:1.5;
}
.report-actions{display:flex;gap:14px;justify-content:center;margin-top:30px;flex-wrap:wrap;}

/* ---------- Animations ---------- */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes popIn{from{opacity:0;transform:scale(0.6);}to{opacity:1;transform:scale(1);}}
@keyframes stampSlam{
  0%{transform:rotate(-9deg) scale(2.6);opacity:0;}
  60%{transform:rotate(-9deg) scale(0.92);opacity:1;}
  100%{transform:rotate(-9deg) scale(1);opacity:1;}
}
@keyframes confettiFall{
  to{transform:translateY(110vh) rotate(600deg);opacity:0;}
}
@keyframes flicker{
  0%,100%{opacity:1;} 50%{opacity:0.85;}
}
.loading-screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.loading-text{font-family:var(--font-type);color:var(--accent-bright);letter-spacing:2px;animation:flicker 1.4s infinite;}
.spinner{
  width:46px;height:46px;border-radius:50%;border:3px solid var(--cork);
  border-top-color:var(--accent-bright);animation:spin 0.9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.footer-note{
  text-align:center;color:var(--text-low);font-family:var(--font-type);
  font-size:0.72rem;padding:20px;letter-spacing:0.5px;
}

@media (max-width:640px){
  .corkboard{padding:16px;border-width:6px;}
  .bar-label{width:88px;font-size:0.7rem;}
  .stamp{letter-spacing:2px;padding:10px 20px;}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState, useEffect, useRef, useCallback, useMemo} = React;

/* ============================================================
   CASE DATA — 10 fictional marketing investigations
   ============================================================ */
const CASES = [
{
  id:1,
  company:`LumeWear`,
  industry:`Direct-to-Consumer Fashion`,
  objective:`Grow Q4 online sales of the new "Aurora" winter coat line by 25% versus last season.`,
  audience:`Urban professionals aged 25-40, mid-to-high income, style-conscious and mobile-first shoppers.`,
  channels:[`Instagram Ads`,`Google Search`,`Email Newsletter`,`TikTok`],
  budget:[{name:`Instagram Ads`,pct:55},{name:`Google Search`,pct:20},{name:`Email`,pct:15},{name:`TikTok`,pct:10}],
  metrics:{reach:`2.4M`,ctr:`4.1%`,engagement:`6.8%`,conversions:`0.3%`,sales:`$38,200`},
  comments:[
    `"Gorgeous ad, but I clicked three times and still couldn't find the actual coat." - verified shopper`,
    `"Watched the whole video, forgot the brand name by the time I opened my browser." - Instagram commenter`,
    `"Tried to buy on my phone and just got dumped on the homepage with 40 other products." - reviewer`
  ],
  social:{platform:`Instagram`, likes:`142K`, shares:`3.1K`, comments:`2,890`, sentiment:`Overwhelmingly positive tone toward the video, but a recurring thread of confused comments asking "where do I buy this?"`},
  primaryMistake:`Instagram ads drove huge reach and warm sentiment but linked to the generic homepage instead of the Aurora product page, breaking the path from curiosity to purchase.`,
  clues:[
    `Landing page analytics show 68% of ad-driven visitors bounced within 4 seconds of landing on the homepage.`,
    `Customer service logged 200+ messages that week asking "where do I find the coat from the ad?"`,

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function pickCase(excludeId){
  const pool = excludeId ? CASES.filter(c=>c.id!==excludeId) : CASES;
  return pool[Math.floor(Math.random()*pool.length)];
}

}

      <text x="50" y="53" textAnchor="middle" fontSize="18" fontFamily="Georgia,serif" fill="var(--accent-bright)" fontWeight="700">MD</text>
    </svg>
  );
}

function GaugeChart({label, value, max, suffix, animateKey}){
  const numeric = parseFloat(value) || 0;
  const pct = Math.min(100, (numeric/max)*100);
  const [dash, setDash] = useState(0);
  const radius = 34, circ = 2*Math.PI*radius;
  useEffect(()=>{
    setDash(0);
    const t = setTimeout(()=> setDash(pct), 80);
    return ()=>clearTimeout(t);
  },[pct, animateKey]);
  return (
    <div className="gauge-wrap">
      <svg width="90" height="90" viewBox="0 0 90 90">
        <circle cx="45" cy="45" r={radius} fill="none" stroke="rgba(0,0,0,0.12)" strokeWidth="8"/>
        <circle cx="45" cy="45" r={radius} fill="none" stroke="url(#gaugeGrad)" strokeWidth="8"
          strokeDasharray={circ} strokeDashoffset={circ - (dash/100)*circ}
          strokeLinecap="round" transform="rotate(-90 45 45)"
          style={{transition:'stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1)'}}/>
        <defs>
          <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#a9612f"/>
            <stop offset="100%" stopColor="#ff9a6b"/>
          </linearGradient>
        </defs>
      </svg>
      <div className="gauge-value">{value}{suffix||''}</div>
      <div className="gauge-label">{label}</div>
    </div>
  );
}

function BarChart({data, animateKey}){
  const [go, setGo] = useState(false);
  useEffect(()=>{ setGo(false); const t=setTimeout(()=>setGo(true),100); return ()=>clearTimeout(t); },[animateKey]);
  return (
    <div>
      {data.map(d=>(
        <div className="bar-row" key={d.name}>
          <div className="bar-label">{d.name}</div>
          <div className="bar-track"><div className="bar-fill" style={{width: go? d.pct+'%':'0%'}}></div></div>
          <div className="bar-pct">{d.pct}%</div>
        </div>
      ))}
    </div>
  );
}

/* ============================================================
   SCREEN: INTRO
   ============================================================ */
function IntroScreen({onStart}){
  return (
    <div className="intro-wrap">
      <div className="lamp-glow"></div>
      <BadgeIcon/>
      <h1 className="title-main">Marketing Detective</h1>
      <div className="title-sub">Case Files Division</div>
      <p className="brief-copy">
        Every case on your desk is a marketing campaign gone wrong. Sales missed the mark,
        customers are talking, and the metrics don't add up. Your job: sift the evidence,
        collect the clues, and name the single decision that sank the campaign.
      </p>
      <button className="btn btn-primary" onClick={onStart}>Report for Duty</button>
    </div>

}

/* ============================================================
   SCREEN: CASE ASSIGNMENT
   ============================================================ */
function CaseAssignment({activeCase, onOpen}){
  const [opened, setOpened] = useState(false);
  const handleClick = ()=>{
    if(opened) return;
    setOpened(true);
    setTimeout(()=> onOpen(), 850);
  };
  return (
    <div className="intro-wrap">
      <ProgressTrack stage={0}/>
      <h2 className="title-main" style={{fontSize:'1.9rem'}}>New Case Assigned</h2>
      <p className="brief-copy">A folder has landed on your desk. Open it to review the file.</p>
      <div className="case-folder-anim" onClick={handleClick} role="button" tabIndex={0}
        onKeyDown={(e)=>{if(e.key==='Enter') handleClick();}}
        style={{opacity: opened?0.4:1, transform: opened?'scale(0.94) rotate(2deg)':'none', transition:'all 0.5s ease'}}>
        <div className="folder-closed">
          <div className="folder-label">CASE FILE #{String(activeCase.id).padStart(3,'0')}</div>
          <div className="folder-stamp">CONFIDENTIAL</div>
          <div className="folder-taps">{opened? 'Opening...' : 'Click to open case file'}</div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   SCREEN: INVESTIGATION BOARD (tabs)
   ============================================================ */
const TABS = [
  {key:'file', label:'Case File'},
  {key:'strategy', label:'Strategy'},
  {key:'performance', label:'Performance'},
  {key:'witnesses', label:'Witnesses'},
  {key:'locker', label:'Evidence Locker'}
];

function InvestigationBoard({c, visited, setVisited, collected, setCollected, onSolve}){
  const [tab, setTab] = useState('file');

  const markVisited = (key)=>{
    if(!visited.includes(key)) setVisited(v=>[...v,key]);
  };
  useEffect(()=>{ markVisited(tab); }, [tab]);

  const allVisited = TABS.every(t=>visited.includes(t.key));
  const allCollected = collected.length >= 3;
  const canSolve = allVisited && allCollected;

  return (
    <div>
      <ProgressTrack stage={1}/>
      <div className="board-header">
        <div>
          <div className="board-title">Investigation Board</div>
          <div className="board-sub">CASE #{String(c.id).padStart(3,'0')} — {c.company}</div>
        </div>
        <div className="rank-pill">Clues {collected.length}/3</div>
      </div>

      <div className="tab-row">
        {TABS.map(t=>(
          <button key={t.key} className={`tab-btn ${tab===t.key?'active':''}`} onClick={()=>setTab(t.key)}>
            {t.label} {visited.includes(t.key) && <span className="tab-check">✓</span>}
          </button>
        ))}
      </div>

      <div className="corkboard">
        {tab==='file' && <CaseFilePanel c={c}/>}
        {tab==='strategy' && <StrategyPanel c={c}/>}
        {tab==='performance' && <PerformancePanel c={c}/>}
        {tab==='witnesses' && <WitnessPanel c={c}/>}
        {tab==='locker' && <LockerPanel c={c} collected={collected} setCollected={setCollected}/>}
      </div>

      <div style={{display:'flex',justifyContent:'center',marginTop:26}}>
        <button className="btn btn-primary" disabled={!canSolve} onClick={onSolve}>
          {canSolve? 'Proceed to Suspect Lineup' : `Review all folders & collect 3 clues (${visited.length}/5 · ${collected.length}/3)`}
        </button>
      </div>
    </div>
  );
}

function CaseFilePanel({c}){
  return (
    <div className="panel grid-2">
      <div className="paper-card" style={{'--tilt':'-1.2deg'}}>
        <PushPin/>
        <h4>Company Dossier</h4>
        <div className="stat-line"><span>Company</span><span>{c.company}</span></div>
        <div className="stat-line"><span>Industry</span><span>{c.industry}</span></div>
      </div>
      <div className="paper-card" style={{'--tilt':'1deg'}}>
        <PushPin/>
        <h4>Objective</h4>
        <p style={{fontSize:'0.88rem',lineHeight:1.5}}>{c.objective}</p>
      </div>
      <div className="paper-card" style={{'--tilt':'-0.6deg'}}>
        <PushPin/>
        <h4>Target Audience</h4>
        <p style={{fontSize:'0.88rem',lineHeight:1.5}}>{c.audience}</p>
      </div>
      <div className="paper-card" style={{'--tilt':'1.4deg'}}>
        <PushPin/>
        <h4>Channels Deployed</h4>
        <div className="chip-row">{c.channels.map(ch=><span className="chip" key={ch}>{ch}</span>)}</div>
      </div>
    </div>
  );
}

function StrategyPanel({c}){
  return (
    <div className="panel grid-2">
      <div className="paper-card" style={{'--tilt':'-0.8deg'}}>
        <PushPin/>
        <h4>Budget Allocation</h4>
        <BarChart data={c.budget} animateKey={c.id}/>
      </div>
      <div className="paper-card" style={{'--tilt':'0.9deg'}}>
        <PushPin/>
        <h4>Channel Notes</h4>
        <p style={{fontSize:'0.85rem',lineHeight:1.6}}>
          Spend was distributed across {c.channels.length} channels. Cross-reference this
          allocation against the Performance folder — sometimes the money and the results
          don't point the same direction.
        </p>
      </div>
    </div>
  );
}

function PerformancePanel({c}){
  return (
    <div className="panel">
      <div className="grid-3" style={{marginBottom:22}}>
        <div className="paper-card" style={{'--tilt':'-1deg',textAlign:'center'}}><PushPin/>
          <div className="gauge-label" style={{marginBottom:6}}>Reach</div>
          <div className="gauge-value">{c.metrics.reach}</div>
        </div>
        <div className="paper-card" style={{'--tilt':'0.7deg'}}>
          <PushPin/>
          <GaugeChart label="CTR" value={c.metrics.ctr} max={10} animateKey={c.id}/>
        </div>
        <div className="paper-card" style={{'--tilt':'-0.5deg'}}>
          <PushPin/>
          <GaugeChart label="Engagement" value={c.metrics.engagement} max={15} animateKey={c.id}/>
        </div>
        <div className="paper-card" style={{'--tilt':'1.1deg'}}>
          <PushPin/>
          <GaugeChart label="Conversions" value={c.metrics.conversions} max={5} animateKey={c.id}/>
        </div>
        <div className="paper-card" style={{'--tilt':'-1.3deg',textAlign:'center'}}><PushPin/>
          <div className="gauge-label" style={{marginBottom:6}}>Sales</div>
          <div className="gauge-value" style={{fontSize:'1.05rem'}}>{c.metrics.sales}</div>
        </div>
      </div>
      <div className="social-card">
        <h4 style={{fontFamily:'var(--font-display)',marginTop:0}}>Social Media Performance — {c.social.platform}</h4>
        <div className="social-metric-row"><span>Likes/Reactions</span><b>{c.social.likes}</b></div>
        <div className="social-metric-row"><span>Shares</span><b>{c.social.shares}</b></div>
        <div className="social-metric-row"><span>Comments</span><b>{c.social.comments}</b></div>
        <div className="social-metric-row" style={{flexDirection:'column',alignItems:'flex-start',gap:6}}>
          <span>Sentiment Notes</span>
          <span style={{color:'var(--text-mid)',fontWeight:400,fontSize:'0.85rem'}}>{c.social.sentiment}</span>
        </div>
      </div>
    </div>
  );
}

function WitnessPanel({c}){
  return (
    <div className="panel witness-grid">
      {c.comments.map((cm,i)=>(
        <div className="sticky" key={i} style={{'--tilt': (i%2===0?-3:2.5)+'deg'}}>{cm}</div>
      ))}
    </div>
  );
}

function LockerPanel({c, collected, setCollected}){
  const [dragOver, setDragOver] = useState(false);
  const collect = (idx)=>{
    if(!collected.includes(idx)) setCollected(prev=>[...prev, idx]);
  };
  const onDrop = (e)=>{
    e.preventDefault();
    setDragOver(false);
    const idx = parseInt(e.dataTransfer.getData('text/plain'),10);
    if(!isNaN(idx)) collect(idx);
  };
  return (
    <div className="panel">
      <p style={{color:'var(--text-mid)',fontFamily:'var(--font-type)',fontSize:'0.85rem',marginBottom:16}}>
        Drag each clue card into the Evidence Locker below (or tap a card to file it).
      </p>
      <div className="clue-scatter">
        {c.clues.map((clue,i)=>(
          <div
            key={i}
            className={`sticky clue-card ${collected.includes(i)?'collected':''}`}
            style={{'--tilt': (i-1)*3+'deg'}}
            draggable={!collected.includes(i)}
            onDragStart={(e)=>e.dataTransfer.setData('text/plain', String(i))}
            onClick={()=>collect(i)}
            title="Drag into the locker, or click to file"
          >
            <strong>Clue {i+1}</strong><br/>{clue}
          </div>
        ))}
      </div>
      <div
        className={`locker-zone ${dragOver?'drag-over':''}`}
        onDragOver={(e)=>{e.preventDefault(); setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={onDrop}
      >
        {collected.length===0 && <div className="locker-empty">Evidence Locker — empty. Drop clues here.</div>}
        {collected.map(i=>(
          <div className="evidence-item" key={i}>✓ Clue {i+1} filed</div>
        ))}
      </div>
    </div>
  );
}

/* ============================================================
   SCREEN: SOLVE THE CASE
   ============================================================ */
function SolveCase({c, onAccuse}){
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [options] = useState(()=> shuffle(c.options));
  return (
    <div>
      <ProgressTrack stage={3}/>
      <div className="board-header">
        <div>
          <div className="board-title">Suspect Lineup</div>
          <div className="board-sub">Which decision sank the campaign?</div>
        </div>
      </div>
      <div className="suspect-grid">
        {options.map((opt,i)=>(
          <div key={i} className={`suspect-card ${selectedIdx===i?'selected':''}`} onClick={()=>setSelectedIdx(i)}>
            <span className="suspect-num">Suspect {String.fromCharCode(65+i)}</span>
            <div className="suspect-text">{opt.text}</div>
            <div className="suspect-check">✓</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',justifyContent:'center'}}>
        <button className="btn btn-primary" disabled={selectedIdx===null} onClick={()=>onAccuse(options[selectedIdx].correct)}>
          Make the Accusation
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   SCREEN: CASE CLOSED
   ============================================================ */
function CaseClosed({correct, onContinue}){
  const pieces = useMemo(()=> Array.from({length: correct? 26:0}).map((_,i)=>({
    left: Math.random()*100,
    delay: Math.random()*0.6,
    dur: 2.2+Math.random()*1.4,
    color: [ 'var(--accent-bright)','var(--gold)','var(--accent)','#f2d38a'][i%4],
    rot: Math.random()*360
  })),[correct]);

  useEffect(()=>{
    const t = setTimeout(onContinue, 3200);
    return ()=>clearTimeout(t);
  },[]);

  return (
    <div className="closed-wrap">
      {pieces.map((p,i)=>(
        <div key={i} className="confetti-piece" style={{
          left:p.left+'%', background:p.color,
          animation:`confettiFall ${p.dur}s linear ${p.delay}s forwards`,
          transform:`rotate(${p.rot}deg)`
        }}></div>
      ))}
      <div className="stamp">Case Closed</div>
      <div className={`result-verdict ${correct?'result-correct':'result-wrong'}`}>
        {correct ? 'Correct deduction, Detective. The file is closed.' : 'Not quite — the true culprit is revealed in your report.'}
      </div>
    </div>
  );
}

/* ============================================================
   SCREEN: LEARNING REPORT
   ============================================================ */
function LearningReport({c, correct, score, cases, onNext, onRestart}){
  return (
    <div>
      <ProgressTrack stage={5}/>
      <div className="report-header">
        <div className="board-sub" style={{marginBottom:6}}>CASE #{String(c.id).padStart(3,'0')} — {c.company}</div>
        <div className="report-score">{correct? '+100 pts' : '+20 pts'}</div>
        <div style={{color:'var(--text-mid)',fontFamily:'var(--font-type)',fontSize:'0.85rem',marginTop:6}}>
          Detective Score: {score} · Cases Closed: {cases}
        </div>
      </div>

      <div className="corkboard">
        <div className="report-section">
          <h3>🔎 What Really Happened</h3>
          <div className="paper-card" style={{'--tilt':'0deg'}}>
            <p style={{fontSize:'0.92rem',lineHeight:1.6,margin:0}}>{c.explanation}</p>
          </div>
        </div>
        <div className="report-section">
          <h3>🛠 Suggested Improvements</h3>
          <ul className="improve-list">
            {c.improvements.map((imp,i)=><li key={i}>{imp}</li>)}
          </ul>
        </div>
      </div>

      <div className="report-actions">
        <button className="btn btn-primary" onClick={onNext}>Next Case</button>
        <button className="btn btn-ghost" onClick={onRestart}>Back to Start</button>
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App(){
  const [screen, setScreen] = useState('intro'); // intro, assignment, board, solve, closed, report
  const [activeCase, setActiveCase] = useState(()=>pickCase());
  const [visited, setVisited] = useState([]);
  const [collected, setCollected] = useState([]);
  const [lastCorrect, setLastCorrect] = useState(false);
  const [score, setScore] = useState(0);
  const [casesClosed, setCasesClosed] = useState(0);

  const stageIndex = {intro:0, assignment:0, board:1, solve:3, closed:4, report:5}[screen] ?? 0;

  const startInvestigation = ()=>{
    setVisited([]); setCollected([]);
    setScreen('assignment');
  };

  const handleAccuse = (isCorrect)=>{
    setLastCorrect(isCorrect);
    setScore(s=> s + (isCorrect?100:20));
    setCasesClosed(n=>n+1);
    setScreen('closed');
  };

  const nextCase = ()=>{
    const nc = pickCase(activeCase.id);
    setActiveCase(nc);
    setVisited([]);
    setCollected([]);
    setScreen('assignment');
  };

  const restart = ()=>{
    setScore(0); setCasesClosed(0);
    setActiveCase(pickCase());
    setVisited([]); setCollected([]);
    setScreen('intro');
  };

  return (
    <div className="app-shell">
      <div className="topbar">
        <div className="brand"><span className="badge-star">★</span> Marketing Detective</div>
        <div className="rank-pill">Score: {score}</div>
      </div>
      <div className="stage-container">
        <div className="stage-inner">
          {screen==='intro' && <IntroScreen onStart={startInvestigation}/>}
          {screen==='assignment' && <CaseAssignment activeCase={activeCase} onOpen={()=>setScreen('board')}/>}
          {screen==='board' && (
            <InvestigationBoard
              c={activeCase}
              visited={visited} setVisited={setVisited}
              collected={collected} setCollected={setCollected}
              onSolve={()=>setScreen('solve')}
            />
          )}
          {screen==='solve' && <SolveCase c={activeCase} onAccuse={handleAccuse}/>}
          {screen==='closed' && <CaseClosed correct={lastCorrect} onContinue={()=>setScreen('report')}/>}
          {screen==='report' && (
            <LearningReport
              c={activeCase} correct={lastCorrect} score={score} cases={casesClosed}
              onNext={nextCase} onRestart={restart}
            />
          )}
        </div>
      </div>
      <div className="footer-note">MARKETING DETECTIVE — CASE FILES DIVISION · {CASES.length} CASES ON RECORD · ALL COMPANIES FICTIONAL</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
